{% extends "base.html" %}
{% block title %}{{ code }} Error — MoodBeats AI{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-32 text-center">
  <div class="text-7xl font-extrabold text-violet-800 mb-4">{{ code }}</div>
  <h1 class="text-2xl font-bold text-white mb-3">
    {% if code == 404 %}Page Not Found{% else %}Something Went Wrong{% endif %}
  </h1>
  <p class="text-slate-400 mb-8">{{ message }}</p>
  <div class="flex gap-4 justify-center">
    <a href="/"       class="btn-secondary">← Home</a>
    <a href="/detect" class="btn-primary">Detect My Mood</a>
  </div>
</div>
{% endblock %}
