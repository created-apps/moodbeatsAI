services:
  - type: web
    name: moodbeats-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false           # set manually in Render dashboard → Environment
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value
      - key: SUPABASE_URL
        sync: false           # optional — leave blank to skip history
      - key: SUPABASE_KEY
        sync: false
